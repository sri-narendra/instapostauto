services:
  - type: web
    name: instapostauto
    env: python
    buildCommand: pip install -r requirements.txt && python -m playwright install chromium --with-deps && python -m playwright install chrome --with-deps
    startCommand: python run.py
    healthCheckPath: /api/health
    envVars:
      - key: MISTRAL_API_KEY
        sync: false
      - key: ZERNIO_API_KEY
        sync: false
      - key: INSTAGRAM_ACCOUNT_ID
        sync: false
      - key: TIMEZONE
        value: Asia/Kolkata
